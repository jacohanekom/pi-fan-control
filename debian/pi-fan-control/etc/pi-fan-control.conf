# pi-fan-control configuration
# Changes take effect after: sudo systemctl restart pi-fan-control.service

# Tach pin (BCM numbering)
# IO5 on DFRobot GPIO Screw HAT = BCM 24
tach_pin 24

# Socket port for nc control
# Usage: echo "status" | nc localhost 7777
#        echo "speed=50" | nc localhost 7777
#        echo "auto" | nc localhost 7777
port 7777

# Temperature/speed thresholds
# Format: temp_speed <celsius> <percent>
# Fan off below first entry, full speed above last entry
temp_speed 40 0
temp_speed 50 25
temp_speed 60 50
temp_speed 70 75
temp_speed 80 100
